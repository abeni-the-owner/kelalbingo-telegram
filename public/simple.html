<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KELALBINGO - Simple</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .card-btn {
            background: #3390ec;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .card-btn.selected {
            background: #4caf50;
        }

        .card-btn.taken {
            background: #9e9e9e;
            cursor: not-allowed;
        }

        .selected-list {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .debug {
            background: #222;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            margin: 10px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎮 KELALBINGO</h1>
            <p>User: <span id="username">Loading...</span></p>
            <p>Balance: <span id="balance">0</span> Birr</p>
        </div>

        <div class="debug" id="debug"></div>

        <h3>🃏 Select Your Cards</h3>
        <div class="cards-grid" id="cards-grid">
            <!-- Cards will be loaded here -->
        </div>

        <div class="selected-list">
            <h4>Selected Cards:</h4>
            <div id="selected-cards">None</div>
        </div>

        <button class="btn" id="start-btn" disabled onclick="startGame()">
            Start Game
        </button>
    </div>

    <script>
        // Simple debug function
        function debug(msg) {
            console.log(msg);
            document.getElementById('debug').innerHTML += msg + '<br>';
        }

        debug('🎮 Starting simple version...');

        // Initialize Telegram
        let tg;
        try {
            tg = window.Telegram?.WebApp || {};
            if (tg.expand) tg.expand();
            if (tg.ready) tg.ready();
            debug('✅ Telegram initialized');
        } catch (e) {
            debug('❌ Telegram error: ' + e.message);
            tg = { initDataUnsafe: {} };
        }

        // Get user
        let currentUser;
        try {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                currentUser = {
                    id: user.id,
                    username: user.username || user.first_name || 'User'
                };
                debug('✅ User: ' + currentUser.username);
            } else {
                currentUser = {
                    id: Date.now(),
                    username: 'Guest'
                };
                debug('⚠️ No user, using guest');
            }
            document.getElementById('username').textContent = currentUser.username;
        } catch (e) {
            debug('❌ User error: ' + e.message);
            currentUser = { id: 1, username: 'Error' };
        }

        // State
        let selectedCards = [];
        let allCards = [];

        // Generate sample cards
        function generateCards() {
            debug('📊 Generating cards...');
            allCards = [];
            for (let i = 1; i <= 50; i++) {
                allCards.push({ id: i, number: i });
            }
            displayCards();
        }

        // Display cards
        function displayCards() {
            const container = document.getElementById('cards-grid');
            container.innerHTML = '';

            allCards.forEach(card => {
                const btn = document.createElement('button');
                btn.className = 'card-btn';
                btn.textContent = card.number;

                if (selectedCards.includes(card.id)) {
                    btn.classList.add('selected');
                }

                btn.onclick = () => toggleCard(card.id);
                container.appendChild(btn);
            });

            updateSelected();
        }

        // Toggle card selection
        function toggleCard(cardId) {
            const index = selectedCards.indexOf(cardId);
            if (index > -1) {
                selectedCards.splice(index, 1);
                debug('➖ Removed card ' + cardId);
            } else {
                selectedCards.push(cardId);
                debug('➕ Added card ' + cardId);
            }
            displayCards();
        }

        // Update selected display
        function updateSelected() {
            const container = document.getElementById('selected-cards');
            const btn = document.getElementById('start-btn');

            if (selectedCards.length === 0) {
                container.textContent = 'None';
                btn.disabled = true;
            } else {
                container.textContent = selectedCards.map(id => '#' + id).join(', ');
                btn.disabled = false;
            }
        }

        // Start game
        function startGame() {
            if (selectedCards.length === 0) return;

            if (tg.showAlert) {
                tg.showAlert(`Starting game with ${selectedCards.length} cards: ${selectedCards.join(', ')}`);
            } else {
                alert(`Starting game with ${selectedCards.length} cards: ${selectedCards.join(', ')}`);
            }
        }

        // Initialize
        try {
            debug('🚀 Initializing...');
            generateCards();
            debug('✅ Ready!');
        } catch (e) {
            debug('❌ Init error: ' + e.message);
        }
    </script>
</body>

</html>
