<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KELALBINGO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Fallback for Socket.IO if CDN fails
        window.socketIOLoaded = false;
        function loadSocketIO() {
            const script = document.createElement('script');
            script.src = 'https://cdn.socket.io/4.6.1/socket.io.min.js';
            script.crossOrigin = 'anonymous';
            script.onload = () => {
                window.socketIOLoaded = true;
                console.log('✅ Socket.IO loaded');
            };
            script.onerror = () => {
                console.warn('❌ Socket.IO CDN failed, continuing without real-time features');
                window.socketIOLoaded = false;
            };
            document.head.appendChild(script);
        }
        loadSocketIO();
    </script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app">
        <!-- Main Game Screen - Shows immediately -->
        <div id="game-screen" class="screen active">
            <!-- Card Selection Section (Top) -->
            <div class="card-selection-section">
                <h3 class="section-title">🃏 Select Your Cards</h3>
                <div id="cards-grid" class="cards-grid-compact">
                    <p class="loading">Loading cards...</p>
                </div>
            </div>

            <!-- User Info & Balance -->
            <div class="header">
                <div class="user-info">
                    <span id="username">Loading...</span>
                </div>
                <div class="balance-info">
                    <div class="balance">
                        <span class="label">Balance:</span>
                        <span id="balance" class="value">0</span> Birr
                    </div>
                    <div class="profit">
                        <span class="label">Profit:</span>
                        <span id="profit" class="value">0</span> Birr
                    </div>
                </div>
            </div>

            <!-- Round Info -->
            <div class="round-info">
                <h2>ROUND <span id="round-number">1</span></h2>
            </div>

            <!-- Debug Log -->
            <div id="debug-log"
                style="background: #222; color: #0f0; padding: 10px; border-radius: 5px; font-size: 12px; margin: 10px 0; max-height: 100px; overflow-y: auto;">
            </div>

            <!-- Navigation Tabs -->
            <div class="tabs">
                <button class="tab active" data-tab="play">🎲 Play</button>
                <button class="tab" data-tab="history">📊 History</button>
            </div>

            <!-- Play Tab -->
            <div id="play-tab" class="tab-content active">
                <div class="play-container">
                    <h3>Selected Cards</h3>
                    <div id="selected-cards" class="selected-cards">
                        <p class="empty-state">No cards selected</p>
                    </div>
                    <button id="start-game-btn" class="btn btn-primary" disabled>
                        Start Game
                    </button>
                </div>
            </div>

            <!-- History Tab -->
            <div id="history-tab" class="tab-content">
                <div class="history-container">
                    <h3>Game History</h3>
                    <div id="stats" class="stats-box"></div>
                    <div id="history-list" class="history-list">
                        <p class="loading">Loading history...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
